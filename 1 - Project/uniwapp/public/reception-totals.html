<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reception Excursion Totals</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div></div>
<div class="brand brand-logo">
  <img src="logo.png" alt="Leanapp logo">
</div>
      <div class="topbar-side right" id="cruiseCodeText"></div>
    </div>
  </header>

  <nav class="main-nav">
    <div class="main-nav-inner">
      <span class="nav-link" onclick="goBackToReception()">Reception Module</span>
      <span class="nav-separator">•</span>
      <span class="nav-link" onclick="window.location.href='reception-guest-excursions.html'">Excursions by Guest</span>
      <span class="nav-separator">•</span>
      <span class="nav-link active-link">Excursion Totals</span>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <h1>Excursion Totals</h1>
      <p>Overview of all excursions, MC items, and onboard events with total selections.</p>
    </section>

    <section class="card">
      <div class="actions-row reception-actions">
        <button class="app-btn secondary" onclick="goBackToReception()">Back to Reception</button>
      </div>
    </section>

    <section class="card">
      <div class="reception-summary">
        <div class="summary-box">
          <span>Total Rooms</span>
          <strong id="totalRooms">0</strong>
        </div>
        <div class="summary-box">
          <span>Submitted</span>
          <strong id="submittedRooms">0</strong>
        </div>
        <div class="summary-box">
          <span>Pending</span>
          <strong id="pendingRooms">0</strong>
        </div>
      </div>
    </section>

    <section class="card">
      <h2 class="section-title">Selections by Excursion</h2>
      <div id="excursionTotalsList" class="reception-totals-list">
        <div class="empty-state">Loading...</div>
      </div>
    </section>
  </main>

  <script src="reception-totals.js"></script>
</body>
</html>
